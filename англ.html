    body {

        padding: 20px;

    }

    .container {
        width: 100%;
        max-width: 800px;
        text-align: center;
    }

    .question {
        font-size: 34px;
        font-weight: bold;
        margin-bottom: 35px;
        background: #1f2937;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .answers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    button {
        padding: 22px;
        font-size: 18px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        background: #374151;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #4b5563;
        transform: scale(1.02);
    }

    button.correct {
        background: #16a34a !important;
    }

    button.wrong {
        background: #dc2626 !important;
    }

    .score {
        margin-top: 25px;
        font-size: 22px;
        opacity: 0.9;
    }

    @media(max-width: 700px) {

        .answers {
            grid-template-columns: 1fr;
        }

        .question {
            font-size: 26px;
        }

        button {
            font-size: 16px;
        }
    }

</style>

let correct = 0;
let wrong = 0;

// список слов без повторений
let remainingWords = [];

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");

function shuffle(array) {

    return array.sort(() => Math.random() - 0.5);
}

function getRandomWordWithoutRepeats() {

    // если все слова закончились
    if (remainingWords.length === 0) {

        // создаём новый перемешанный список
        remainingWords = shuffle([...words]);
    }

    // берём последнее слово
    return remainingWords.pop();
}

function nextQuestion() {

    answersEl.innerHTML = "";

    // берём слово без повторов
    const current = getRandomWordWithoutRepeats();

    questionEl.textContent = current.pl;

    let options = [current];

    while (options.length < 4) {

        const randomWord =
            words[Math.floor(Math.random() * words.length)];

        if (!options.includes(randomWord)) {

            options.push(randomWord);
        }
    }

    options = shuffle(options);

    options.forEach(option => {

        const button = document.createElement("button");

        button.textContent = option.en;

        button.onclick = () => {

            const buttons =
                document.querySelectorAll("button");

            buttons.forEach(btn => btn.disabled = true);

            if (option.en === current.en) {

                button.classList.add("correct");

                correct++;

                document.getElementById("correct").textContent =
                    correct;

            } else {

                button.classList.add("wrong");

                wrong++;

                document.getElementById("wrong").textContent =
                    wrong;

                buttons.forEach(btn => {

                    if (btn.textContent === current.en) {

                        btn.classList.add("correct");
                    }
                });
            }

            setTimeout(() => {

                nextQuestion();

            }, 1000);
        };

        answersEl.appendChild(button);
    });
}

nextQuestion();

</script>
